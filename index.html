  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">

  <link rel="apple-touch-icon" href="jukugo.png">
  <link rel="icon" type="image/png" href="jukugo.png">
  <link rel="manifest" href="manifest.json">

  <title>熟語フラッシュ</title>

  <style>
    :root{
      --bg:#f4f6fb;
      --card:#ffffff;
      --line:#d7deea;
      --text:#0f172a;
      --blue1:#5b86f3;
      --blue2:#3567e8;
      --green1:#43c06b;
      --green2:#29a957;
      --red1:#f35a48;
      --red2:#e84533;
      --gray1:#7c8da6;
      --gray2:#677990;
      --orange1:#f6b331;
      --orange2:#ee9b0f;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --shadow-strong:0 10px 20px rgba(0,0,0,.14);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:"Yu Gothic","Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
      overflow-x:hidden;
      width:100%;
    }

    body{
      padding:10px;
      overscroll-behavior:none;
      touch-action:manipulation;
    }

    .wrap{
      max-width:920px;
      margin:0 auto;
      overflow:hidden;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:14px;
      overflow:hidden;
    }

    .top-grid{
      display:grid;
      grid-template-columns:130px 100px 1fr 1fr;
      gap:10px;
      align-items:end;
      margin-bottom:12px;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:800;
      margin:0 0 6px 2px;
    }

    .field input,
    .field select,
    .top-btn,
    .bottom-btn,
    .side-btn,
    .jp-toggle{
      font-size:16px;
    }

    .field input,
    .field select{
      width:100%;
      height:52px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      color:var(--text);
      padding:0 12px;
      outline:none;
    }

    .flash-field input{
      text-align:center;
    }

    .top-btn{
      width:100%;
      height:56px;
      border:none;
      border-radius:18px;
      color:#fff;
      font-weight:900;
      cursor:pointer;
      touch-action:manipulation;
      min-width:82px;
      font-size:18px;
      transition:transform .14s ease, box-shadow .14s ease, filter .14s ease;
      box-shadow:0 6px 14px rgba(0,0,0,.10);
      overflow:hidden;
    }

    .start-btn{
      background:linear-gradient(180deg,var(--red1),var(--red2));
    }

    .resume-btn{
      background:linear-gradient(180deg,var(--blue1),var(--blue2));
    }

    .main-grid{
      display:grid;
      grid-template-columns:74px 1fr 74px;
      gap:10px;
      align-items:stretch;
    }

    .side-btn{
      min-height:52vh;
      border:none;
      border-radius:26px;
      color:#fff;
      font-weight:900;
      cursor:pointer;
      writing-mode:vertical-rl;
      text-orientation:upright;
      letter-spacing:2px;
      display:flex;
      align-items:center;
      justify-content:center;
      touch-action:manipulation;
      font-size:19px;
      transition:transform .14s ease, box-shadow .14s ease, filter .14s ease;
      box-shadow:0 8px 18px rgba(0,0,0,.10);
    }

    .stop-btn{
      background:linear-gradient(180deg,var(--green1),var(--green2));
    }

    .next-btn{
      background:linear-gradient(180deg,var(--blue1),var(--blue2));
    }

    .center-col{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }

    .card-box{
      position:relative;
      min-height:52vh;
      border:1px solid var(--line);
      border-radius:24px;
      background:#fcfdff;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px 18px 20px;
      overflow:hidden;
    }

    .card-content{
      width:100%;
      animation:cardFade .32s ease;
    }

    @keyframes cardFade{
      from{
        opacity:0;
        transform:translateY(8px) scale(.985);
      }
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .word{
      margin:0 0 18px 0;
      font-weight:900;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:clip;
      word-break:keep-all;
      overflow-wrap:normal;
      max-width:100%;
      width:100%;
      text-align:center;
      font-size:54px;
      letter-spacing:-0.03em;
      padding-bottom:6px;
    }

    .meaning{
      margin:6px 0 0 0;
      font-size:34px;
      line-height:1.25;
      color:#334155;
      word-break:break-word;
      min-height:1.4em;
    }

    .below-card{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:start;
    }

    .below-text{
      text-align:center;
      font-size:16px;
      font-weight:800;
      line-height:1.5;
      min-height:52px;
    }

    .jp-toggle{
      width:88px;
      height:62px;
      border:none;
      border-radius:16px;
      background:#d1d5db;
      color:#334155;
      font-weight:900;
      cursor:pointer;
      flex-shrink:0;
      touch-action:manipulation;
      font-size:18px;
      transition:transform .14s ease, box-shadow .14s ease;
      box-shadow:0 6px 14px rgba(0,0,0,.10);
    }

    .jp-toggle.active{
      background:linear-gradient(180deg,var(--blue1),var(--blue2));
      color:#fff;
    }

    .bottom-row{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .bottom-btn{
      height:68px;
      border:none;
      border-radius:20px;
      color:#fff;
      font-weight:900;
      cursor:pointer;
      touch-action:manipulation;
      font-size:18px;
      transition:transform .14s ease, box-shadow .14s ease, filter .14s ease;
      box-shadow:0 8px 18px rgba(0,0,0,.10);
    }

    .restart-btn{
      background:linear-gradient(180deg,var(--red1),var(--red2));
    }

    .save-btn{
      background:linear-gradient(180deg,var(--gray1),var(--gray2));
    }

    .back-btn{
      background:linear-gradient(180deg,var(--orange1),var(--orange2));
    }

    .top-btn:active,
    .bottom-btn:active,
    .side-btn:active,
    .jp-toggle:active{
      transform:scale(0.96);
      box-shadow:0 4px 10px rgba(0,0,0,.12);
    }

    @media (max-width: 480px){
      body{
        padding:8px;
      }

      .panel{
        padding:10px;
        border-radius:24px;
      }

      .top-grid{
        grid-template-columns:92px 76px 1fr 1fr;
        gap:6px;
      }

      .field input,
      .field select{
        height:50px;
        border-radius:14px;
        padding:0 10px;
      }

      .top-btn{
        height:58px;
        border-radius:16px;
        min-width:0;
        font-size:16px;
        padding:0 6px;
        overflow:hidden;
      }

      .main-grid{
        grid-template-columns:60px 1fr 60px;
        gap:8px;
      }

      .side-btn{
        min-height:46vh;
        border-radius:22px;
        font-size:17px;
      }

      .card-box{
        min-height:46vh;
        border-radius:22px;
        padding:16px 10px 16px;
      }

      .word{
        font-size:22px !important;
      }

      .meaning{
        font-size:24px;
      }

      .below-text{
        font-size:14px;
        min-height:48px;
      }

      .jp-toggle{
        width:76px;
        height:54px;
        border-radius:14px;
        font-size:16px;
      }

      .bottom-btn{
        height:64px;
        border-radius:18px;
        font-size:17px;
      }
    }

    @media (min-width: 481px) and (max-width: 767px){
      .word{
        font-size:34px;
      }

      .meaning{
        font-size:28px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">

      <div class="top-grid">
        <div class="field">
          <label for="mode">分類</label>
          <select id="mode">
            <option value="two">二字熟語</option>
            <option value="four">四字熟語</option>
            <option value="special">特別</option>
          </select>
        </div>

        <div class="field flash-field">
          <label for="sec">フラッシュ秒</label>
          <input id="sec" type="number" value="1.5" step="0.1" min="0.3">
        </div>

        <button class="top-btn start-btn" id="start">スタート</button>
        <button class="top-btn resume-btn" id="resume">途中から再開</button>
      </div>

      <div class="main-grid">
        <button class="side-btn stop-btn" id="stop">ストップ</button>

        <div class="center-col">
          <div class="card-box">
            <div class="card-content" id="cardContent">
              <div class="word" id="word">準備OK</div>
              <div class="meaning" id="meaning"></div>
            </div>
          </div>

          <div class="below-card">
            <div class="below-text">
              <div id="meta">準備OK</div>
              <div id="progress">0 / 0</div>
            </div>
            <button class="jp-toggle active" id="toggleReading">読み表示</button>
          </div>
        </div>

        <button class="side-btn next-btn" id="next">次へ</button>
      </div>

      <div class="bottom-row">
        <button class="bottom-btn restart-btn" id="restart">最初から</button>
        <button class="bottom-btn save-btn" id="save">位置を保存</button>
        <button class="bottom-btn back-btn" id="back">戻る</button>
      </div>

    </div>
  </div>

    const DATA_SPECIAL = [
      // { word: "臨機応変", meaning: "りんきおうへん" },
    ];

    const STORAGE_KEY_INDEX = "jukugo_flash_saved_index_v2";
    const STORAGE_KEY_MODE = "jukugo_flash_saved_mode_v2";
    const STORAGE_KEY_SEC = "jukugo_flash_saved_sec_v2";
    const STORAGE_KEY_SHOW = "jukugo_flash_saved_show_v2";

    const modeEl = document.getElementById("mode");
    const secEl = document.getElementById("sec");
    const wordEl = document.getElementById("word");
    const meaningEl = document.getElementById("meaning");
    const metaEl = document.getElementById("meta");
    const progressEl = document.getElementById("progress");
    const toggleReadingBtn = document.getElementById("toggleReading");

    const startBtn = document.getElementById("start");
    const resumeBtn = document.getElementById("resume");
    const stopBtn = document.getElementById("stop");
    const nextBtn = document.getElementById("next");
    const restartBtn = document.getElementById("restart");
    const saveBtn = document.getElementById("save");
    const backBtn = document.getElementById("back");

    let currentList = [];
    let currentIndex = 0;
    let timer = null;
    let isPlaying = false;
    let showReading = true;

    function getCurrentList() {
      const mode = modeEl.value;
      if (mode === "two") return DATA_TWO;
      if (mode === "four") return DATA_FOUR;
      return DATA_SPECIAL;
    }

    function saveCurrentState() {
      localStorage.setItem(STORAGE_KEY_INDEX, String(currentIndex));
      localStorage.setItem(STORAGE_KEY_MODE, modeEl.value);
      localStorage.setItem(STORAGE_KEY_SEC, secEl.value);
      localStorage.setItem(STORAGE_KEY_SHOW, showReading ? "1" : "0");
    }

    function fitWord() {
      const textLength = wordEl.textContent.length;
      let size = 54;

      if (window.innerWidth <= 480) {
        size = 22;
        if (textLength >= 5) size = 20;
        if (textLength >= 7) size = 18;
        if (textLength >= 9) size = 16;
      } else if (window.innerWidth <= 767) {
        size = 34;
        if (textLength >= 5) size = 30;
        if (textLength >= 7) size = 26;
        if (textLength >= 9) size = 22;
      } else {
        size = 54;
        if (textLength >= 5) size = 48;
        if (textLength >= 7) size = 42;
        if (textLength >= 9) size = 34;
      }

      wordEl.style.fontSize = size + "px";
    }

    function renderCard() {
      if (!currentList.length) {
        wordEl.textContent = "データなし";
        meaningEl.textContent = "";
        progressEl.textContent = "0 / 0";
        metaEl.textContent = "データを貼ってください";
        fitWord();
        return;
      }

      const safeIndex = Math.max(0, Math.min(currentIndex, currentList.length - 1));
      const item = currentList[safeIndex];

      wordEl.textContent = item.word;
      meaningEl.textContent = showReading ? item.meaning : "";
      progressEl.textContent = `${safeIndex + 1} / ${currentList.length}`;
      metaEl.textContent = isPlaying
        ? `フラッシュ中（${Number(secEl.value).toFixed(1)}秒ごと）`
        : "停止中";

      fitWord();
    }

    function stopFlash() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      isPlaying = false;
      saveCurrentState();
      renderCard();
    }

    function nextCard(auto = false) {
      if (!currentList.length) return;

      currentIndex++;
      if (currentIndex >= currentList.length) {
        currentIndex = 0;
        metaEl.textContent = auto ? "最後まで表示したので先頭に戻りました" : "先頭に戻りました";
      }

      saveCurrentState();
      renderCard();
    }

    function startFlash(fromBeginning = true) {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }

      currentList = getCurrentList();

      if (fromBeginning) {
        currentIndex = 0;
      } else {
        if (currentIndex >= currentList.length) currentIndex = 0;
        if (currentIndex < 0) currentIndex = 0;
      }

      isPlaying = true;
      renderCard();
      saveCurrentState();

      const sec = Math.max(0.3, Number(secEl.value) || 1.5) * 1000;
      timer = setInterval(() => {
        nextCard(true);
      }, sec);
    }

    function loadState() {
      const savedMode = localStorage.getItem(STORAGE_KEY_MODE);
      const savedSec = localStorage.getItem(STORAGE_KEY_SEC);
      const savedIndex = localStorage.getItem(STORAGE_KEY_INDEX);
      const savedShow = localStorage.getItem(STORAGE_KEY_SHOW);

      if (savedMode) modeEl.value = savedMode;
      if (savedSec) secEl.value = savedSec;
      if (savedShow !== null) showReading = savedShow === "1";

      toggleReadingBtn.classList.toggle("active", showReading);
      toggleReadingBtn.textContent = showReading ? "読み表示" : "読み非表示";

      currentList = getCurrentList();

      if (savedIndex !== null) {
        currentIndex = Number(savedIndex) || 0;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= currentList.length) currentIndex = 0;
      } else {
        currentIndex = 0;
      }

      renderCard();
      return savedIndex !== null;
    }

    toggleReadingBtn.addEventListener("click", () => {
      showReading = !showReading;
      toggleReadingBtn.classList.toggle("active", showReading);
      toggleReadingBtn.textContent = showReading ? "読み表示" : "読み非表示";
      saveCurrentState();
      renderCard();
    });

    startBtn.addEventListener("click", () => {
      currentList = getCurrentList();
      currentIndex = 0;
      startFlash(false);
    });

    resumeBtn.addEventListener("click", () => {
      loadState();
      startFlash(false);
    });

    stopBtn.addEventListener("click", () => {
      stopFlash();
    });

    nextBtn.addEventListener("click", () => {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      isPlaying = false;
      currentList = getCurrentList();
      nextCard(false);
    });

    restartBtn.addEventListener("click", () => {
      currentList = getCurrentList();
      currentIndex = 0;
      saveCurrentState();
      stopFlash();
      renderCard();
      metaEl.textContent = "最初からに戻しました";
    });

    saveBtn.addEventListener("click", () => {
      saveCurrentState();
      metaEl.textContent = "現在位置を保存しました";
      renderCard();
    });

    backBtn.addEventListener("click", () => {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      isPlaying = false;
      currentList = getCurrentList();
      if (currentList.length > 0) {
        currentIndex = currentIndex > 0 ? currentIndex - 1 : currentList.length - 1;
        saveCurrentState();
        renderCard();
      }
    });

    modeEl.addEventListener("change", () => {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      isPlaying = false;
      currentList = getCurrentList();
      currentIndex = 0;
      saveCurrentState();
      renderCard();
    });

    secEl.addEventListener("change", () => {
      saveCurrentState();
      if (isPlaying) {
        startFlash(false);
      } else {
        renderCard();
      }
    });

    window.addEventListener("resize", fitWord);

    loadState();
    currentList = getCurrentList();
    renderCard();
  </script>
